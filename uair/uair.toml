# uair — focus timers (10/20/30/60/90 min). No auto-break cycle.
# Control: wofi menu (wofi-pomodoro.sh) or tmux (prefix+u toggle).
# Starts PAUSED; pick a duration -> the script does `uairctl jump <id>; resume`.
# Each session, on finish: pause music + notify + ring the bell.

loop_on_end = false
pause_at_start = true

[defaults]
time_format = "%*H:%M:%S"  # show hours only when non-zero (60/90m sessions)
paused_state_text = " ⏸"
resumed_state_text = ""

[[sessions]]
id = "s5"
name = "5m"
duration = "5m"
command = "playerctl --all-players pause 2>/dev/null; notify-send -u normal 'uair 🍅' '5 min — done!'; pw-play $HOME/.config/uair/bell.wav"
format = "🍅 {name} {time}{state}"

