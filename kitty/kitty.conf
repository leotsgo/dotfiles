 /* Font Options */

font_family           Comic Code Ligatures
font_size             10

# Nerd Font icons: pull these codepoints from the Nerd Font directly, bypassing
# fontconfig fallback (which now grabs Material Symbols -> tiny/missing glyphs).
symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58 Symbols Nerd Font Mono
symbol_map U+E000-U+E00A Symbols Nerd Font Mono
symbol_map U+E0A0-U+E0C8,U+E0CA,U+E0CC-U+E0D7 Symbols Nerd Font Mono
symbol_map U+E200-U+E2A9 Symbols Nerd Font Mono
symbol_map U+E300-U+E3E3 Symbols Nerd Font Mono
symbol_map U+E5FA-U+E6B7 Symbols Nerd Font Mono
symbol_map U+E700-U+E8EF Symbols Nerd Font Mono
symbol_map U+EA60-U+EC1E Symbols Nerd Font Mono
symbol_map U+ED00-U+EFCE Symbols Nerd Font Mono
symbol_map U+F000-U+F2FF Symbols Nerd Font Mono
symbol_map U+F300-U+F381 Symbols Nerd Font Mono
symbol_map U+F400-U+F533,U+F0001-U+F1AF0 Symbols Nerd Font Mono
background_opacity    0.9

/* Window Layout Options*/

remember_window_size  yes
draw_minimal_borders  yes

/* Disable annoying bell */

enable_audio_bell no

/* Cursor shape */

cursor_shape                block
shell_integration           no-cursor

/* Default Options */

scrollback_lines        10000
mouse_hide_wait         -2.0
open_url_with           default
copy_on_select          yes
tab_bar_style           powerline
update_check_interval   0
confirm_os_window_close 0
map shift+insert        paste_from_clipboard
map alt+enter           new_os_window_with_cwd
modify_font             underline_thickness 300%
hide_window_decorations yes


# kitty +kitten themes --reload-in=all
# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME

